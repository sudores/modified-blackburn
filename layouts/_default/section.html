{{ partial "header.html" . }}

<div class="header">
  <h1>{{ .Title }}</h1>
</div>
<div class="content">
  {{ .Content }}
  <ul>
  {{ range .Paginator.Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <div>{{ .Summary }}</div>
    </li>
  {{ end }}
  </ul>
  {{ partial "pagination.html" . }}
</div>

{{ partial "footer.html" . }}
